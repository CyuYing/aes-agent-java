# ==========================================
# AES Agent - DeepSeek API Configuration
# 复制此文件为 application.properties 并填入你的 API Key
# ==========================================

# DeepSeek API (OpenAI-compatible)
deepseek.api.key=${DEEPSEEK_API_KEY:your-api-key-here}
deepseek.base.url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
deepseek.model.name=${DEEPSEEK_MODEL:deepseek-chat}

# ==========================================
# Chroma Vector Store (local, optional)
# ==========================================
chroma.base.url=${CHROMA_BASE_URL:http://localhost:8000}
chroma.collection.name=${CHROMA_COLLECTION:aes-knowledge}

# ==========================================
# Knowledge Base Path (relative to project root)
# ==========================================
aes.knowledge-base.path=data/knowledge_base

# ==========================================
# Spring Boot Server
# ==========================================
server.port=${PORT:8080}

# ==========================================
# File Upload Limits
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# Logging
# ==========================================
logging.level.com.aes=INFO
